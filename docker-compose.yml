version: "3.9"

services:
  app:
    build: .
    ports:
      - "3333:3333"
    environment:
      - NODE_ENV=production
      - PORT=3333
      # Oracle — override with real values or use an .env file (nada de segredo commitado aqui).
      - ORACLE_USER=${ORACLE_USER:-}
      - ORACLE_PASSWORD=${ORACLE_PASSWORD:-}
      # config.ts lê ORACLE_CONNECT_STRING (não ORACLE_CONNECTION_STRING).
      - ORACLE_CONNECT_STRING=${ORACLE_CONNECT_STRING:-}
      # Segredos obrigatórios: vêm do .env/ambiente. A sintaxe ${VAR:?msg} FALHA o boot
      # se ausente, em vez de embutir um valor-padrão fraco no repositório.
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET obrigatorio (min. 32 chars, ver config.ts)}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@montadores.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD obrigatorio}
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    # /ready responde 503 quando o Oracle está indisponível (readiness), fazendo o
    # container ser marcado unhealthy — /api/health é só liveness (sempre 200).
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3333/api/ready"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  uploads:
