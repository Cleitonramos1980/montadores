<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1F2855" />
    <meta name="description" content="Jornada Pós-venda — acompanhamento de entrega, montagem, avaliações e SAC." />
    <title>Jornada Pós-venda</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/manifest.json" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/client/main.tsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        // Em dev (Vite) desregistra todos os SWs para não servir cache antigo
        if (location.port === "5173") {
          navigator.serviceWorker.getRegistrations().then((regs) => {
            regs.forEach((r) => r.unregister());
          });
        } else {
          window.addEventListener("load", () => {
            navigator.serviceWorker.register("/sw.js").catch(() => {});
          });
        }
      }
    </script>
  </body>
</html>
